<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2 >Student Registration Form</h2>
    <div class="container"></div>
    <form action="">
        <label for="firstName">First Name</label>
        <br><input type="text">
<br><br>
        <label for="lastName">Last Name</label>
        <br><input type="text">
<br><br>
        <label for="email">Email Address</label>
        <br><input type="email" id="email" required>
<br><br>
        <label for="mobileNumber">Phone Number</label>
        <br><input type="tel" id="mobileNumber" required>
<br><br>
        <label for="age">Age</label>
        <br><input type="number" id="age" min="18" required>

        <br><br>
        
        <label style="color:cornflowerblue;" for="">Gender</label> 
        <br><input type="radio" name="gender">Male
        <br><input type="radio" name="gender">Female
<br><br>
        <label for="">Department</label>
        <br><input type="text">
        <select name="" id=""></select>
        
    </form>
    <button>Submit</button>
</body>
</html>
